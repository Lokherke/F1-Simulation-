<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Championship Predictor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23ef4444' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>F1</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e27;
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Left half - Description */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 50px;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
    }

    .left h1 {
      font-size: 2.8rem;
      margin-bottom: 20px;
      color: #ef4444;
      font-weight: 700;
    }

    .left p {
      font-size: 1.05rem;
      color: #b0b0b0;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .features {
      margin-top: 30px;
      text-align: left;
    }

    .feature-item {
      margin-bottom: 15px;
      font-size: 0.95rem;
      color: #888;
      display: flex;
      align-items: center;
    }

    .feature-item::before {
      content: "→";
      color: #ef4444;
      margin-right: 12px;
      font-weight: bold;
      font-size: 1.1rem;
    }

    /* Right half - Button & Animation */
    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #ef4444 0%, #c41e3a 100%);
    }

    .animated-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255,255,255,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.08) 0%, transparent 50%);
      animation: bgShift 8s ease-in-out infinite;
    }

    @keyframes bgShift {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(25px, -25px);
      }
    }

    .floating-circle {
      position: absolute;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      animation: float 12s ease-in-out infinite;
    }

    .circle-1 {
      width: 250px;
      height: 250px;
      top: -80px;
      left: -80px;
      animation-delay: 0s;
    }

    .circle-2 {
      width: 350px;
      height: 350px;
      bottom: -120px;
      right: -80px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-40px) rotate(180deg);
      }
    }

    .cta-button {
      position: relative;
      z-index: 10;
      padding: 18px 55px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #ef4444;
      background: white;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 12px 35px rgba(0,0,0,0.2);
      text-decoration: none;
      display: inline-block;
      letter-spacing: 0.5px;
    }

    .cta-button:hover {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      background: #f8f8f8;
    }

    .cta-button:active {
      transform: scale(0.95);
    }

    @media (max-width: 1024px) {
      .left {
        padding: 50px 40px;
      }
      
      .left h1 {
        font-size: 2.3rem;
      }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left {
        padding: 40px 30px;
        justify-content: flex-start;
        padding-top: 50px;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      }

      .left h1 {
        font-size: 2rem;
        margin-bottom: 15px;
      }

      .left p {
        font-size: 0.95rem;
      }

      .feature-item {
        font-size: 0.85rem;
        margin-bottom: 12px;
      }

      .right {
        min-height: 300px;
        background: linear-gradient(135deg, #ef4444 0%, #c41e3a 100%);
      }

      .cta-button {
        padding: 15px 45px;
        font-size: 1.1rem;
      }

      .circle-1 {
        width: 180px;
        height: 180px;
      }

      .circle-2 {
        width: 250px;
        height: 250px;
      }
    }

    @media (max-width: 480px) {
      .left {
        padding: 30px 20px;
        padding-top: 40px;
      }

      .left h1 {
        font-size: 1.6rem;
      }

      .left p {
        font-size: 0.9rem;
      }

      .cta-button {
        padding: 12px 35px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left: Description -->
    <div class="left">
      <h1>F1 Championship Predictor</h1>
      <p>Predict the next Formula 1 World Champion using advanced Monte Carlo simulations powered by real-time race data.</p>
      
      <div class="features">
        <div class="feature-item">Current season predictions</div>
        <div class="feature-item">Next season forecasts</div>
        <div class="feature-item">Real FastF1 data integration</div>
        <div class="feature-item">Customizable simulation parameters</div>
      </div>
    </div>

    <!-- Right: Button with Animation -->
    <div class="right">
      <div class="floating-circle circle-1"></div>
      <div class="floating-circle circle-2"></div>
      <div class="animated-bg"></div>
      <a href="/simulation" class="cta-button">Start Simulation</a>
    </div>
  </div>
</body>
</html>
